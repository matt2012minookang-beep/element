<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <title>원소 외우기</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1f2937, #020617 70%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .main {
      width: min(920px, 92vw);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      padding: 38px 28px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 5vw, 56px);
    }

    .sub {
      color: #cbd5e1;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .btn {
      border: 0;
      border-radius: 18px;
      padding: 16px 24px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: white;
      box-shadow: 0 12px 30px rgba(56,189,248,.25);
      transition: .18s;
      margin: 6px;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .quizBox {
      margin-top: 28px;
      background: rgba(15, 23, 42, .7);
      border-radius: 24px;
      padding: 24px;
      text-align: left;
      border: 1px solid rgba(255,255,255,.12);
    }

    .quizBox h2 {
      margin-top: 0;
      text-align: center;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin: 16px 0 20px;
    }

    label {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      padding: 12px;
      border-radius: 14px;
      cursor: pointer;
      user-select: none;
    }

    input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 6px;
    }

    .quizCard {
      display: none;
      margin-top: 20px;
      background: rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,.14);
    }

    .hint {
      text-align: center;
      margin-bottom: 18px;
      font-size: 18px;
      color: #e0f2fe;
    }

    .bigSymbol {
      text-align: center;
      font-size: 58px;
      font-weight: 900;
      margin: 10px 0;
    }

    .answerArea {
      display: grid;
      gap: 10px;
    }

    .answerArea input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(2,6,23,.7);
      color: white;
      font-size: 16px;
      outline: none;
    }

    .result {
      margin-top: 14px;
      line-height: 1.7;
      font-weight: 700;
    }

    .ok { color: #86efac; }
    .no { color: #fca5a5; }

    .small {
      color: #94a3b8;
      font-size: 14px;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="main">
    <h1>원소 외우기</h1>
    <p class="sub">
      주기율표를 보면서 원소 이름, 기호, 번호, 원자량, 질량수, 상태를 켜고 끄며 외우고,<br>
      원하는 항목만 골라 퀴즈로 연습할 수 있습니다.
    </p>

    <button class="btn" onclick="openPeriodicTable()">주기율표 보기</button>

    <div class="quizBox">
      <h2>퀴즈 풀기</h2>
      <div class="small">맞힐 항목을 선택한 뒤 퀴즈 시작을 누르세요.</div>

      <div class="checks">
        <label><input type="checkbox" class="quizField" value="name" checked> 원소 이름</label>
        <label><input type="checkbox" class="quizField" value="symbol"> 원소 기호</label>
        <label><input type="checkbox" class="quizField" value="number"> 원소 번호</label>
        <label><input type="checkbox" class="quizField" value="atomicWeight"> 원자량</label>
        <label><input type="checkbox" class="quizField" value="massNumber"> 질량수</label>
        <label><input type="checkbox" class="quizField" value="state"> 상태</label>
      </div>

      <div style="text-align:center;">
        <button class="btn" onclick="startQuiz()">퀴즈 시작</button>
        <button class="btn" onclick="checkQuiz()">정답 확인</button>
        <button class="btn" onclick="nextQuiz()">다음 문제</button>
      </div>

      <div class="quizCard" id="quizCard">
        <div class="hint" id="quizHint"></div>
        <div class="bigSymbol" id="quizDisplay">?</div>
        <div class="answerArea" id="answerArea"></div>
        <div class="result" id="quizResult"></div>
      </div>
    </div>
  </div>

  massNumber: "질량수",
  state: "상태"
};

let currentQuizElement = null;
let currentQuizFields = [];

function getValue(el, field) {
  if (field === "name") return el.name;
  if (field === "symbol") return el.s;
  if (field === "number") return String(el.n);
  if (field === "atomicWeight") return el.aw;
  if (field === "massNumber") return el.m;
  if (field === "state") return el.state;
  return "";
}

function normalizeAnswer(v) {
  return String(v).trim().toLowerCase().replace(/\s/g, "");
}

function startQuiz() {
  currentQuizFields = [...document.querySelectorAll(".quizField:checked")].map(x => x.value);

  if (currentQuizFields.length === 0) {
    alert("맞힐 항목을 하나 이상 선택하세요.");
    return;
  }

  document.getElementById("quizCard").style.display = "block";
  nextQuiz();
}

function nextQuiz() {
  if (currentQuizFields.length === 0) {
    currentQuizFields = [...document.querySelectorAll(".quizField:checked")].map(x => x.value);
  }

  currentQuizElement = elements[Math.floor(Math.random() * elements.length)];

  const possibleHints = ["symbol", "name", "number"].filter(f => !currentQuizFields.includes(f));
  const hintField = possibleHints.length ? possibleHints[0] : null;

  const hint = document.getElementById("quizHint");
  const display = document.getElementById("quizDisplay");

  if (hintField) {
    hint.textContent = `힌트: ${fieldNames[hintField]}`;
    display.textContent = getValue(currentQuizElement, hintField);
  } else {
    hint.textContent = "힌트 없음: 선택한 항목이 많아서 전부 직접 맞혀야 합니다.";
    display.textContent = "?";
  }

  const area = document.getElementById("answerArea");
  area.innerHTML = "";

  currentQuizFields.forEach(field => {
    const input = document.createElement("input");
    input.placeholder = fieldNames[field] + " 입력";
    input.dataset.field = field;
    area.appendChild(input);
  });

  document.getElementById("quizResult").innerHTML = "";
}

function checkQuiz() {
  if (!currentQuizElement) {
    alert("먼저 퀴즈 시작을 누르세요.");
    return;
  }

  const inputs = [...document.querySelectorAll("#answerArea input")];
  let html = "";
  let allCorrect = true;

  inputs.forEach(input => {
    const field = input.dataset.field;
    const user = normalizeAnswer(input.value);
    const answer = normalizeAnswer(getValue(currentQuizElement, field));

    if (user === answer) {
      html += `<div class="ok">○ ${fieldNames[field]} 정답!</div>`;
    } else {
      allCorrect = false;
      html += `<div class="no">× ${fieldNames[field]} 오답 | 정답: ${getValue(currentQuizElement, field)}</div>`;
    }
  });

  if (allCorrect) {
    html = `<div class="ok">전부 정답입니다!</div>` + html;
  }

  document.getElementById("quizResult").innerHTML = html;
}
